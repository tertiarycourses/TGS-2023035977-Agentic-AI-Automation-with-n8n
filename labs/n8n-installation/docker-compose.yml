services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_SECURE_COOKIE=false        # allow login over plain http://localhost
      - GENERIC_TIMEZONE=Asia/Singapore
      - N8N_DEFAULT_BINARY_DATA_MODE=filesystem

      # --- Public webhook URL (uncomment & set when tunnelling with ngrok) ---
      # When n8n sits behind a tunnel, it must build webhook/Telegram URLs with
      # your PUBLIC https address, not http://localhost:5678. Set these to your
      # current ngrok URL (no trailing path), then `docker compose up -d` again.
      # - WEBHOOK_URL=https://YOUR-SUBDOMAIN.ngrok-free.app/
      # - N8N_HOST=YOUR-SUBDOMAIN.ngrok-free.app
      # - N8N_PROTOCOL=https

volumes:
  n8n_data:
