name: Deploy Course Demos to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'labs/activity6-investment-advisor/**'
      - 'labs/activity7-finance-advisor/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site (Finance Advisor at root, Investment Advisor under /investment-advisor)
        run: |
          mkdir -p _site/investment-advisor
          # Root = Activity 7 Finance Advisor dashboard (self-contained)
          cp "labs/activity7-finance-advisor/index.html" _site/index.html
          # Activity 6 Investment Advisor lead-magnet site
          cp labs/activity6-investment-advisor/index.html _site/investment-advisor/index.html
          cp labs/activity6-investment-advisor/script.js  _site/investment-advisor/script.js
          cp labs/activity6-investment-advisor/style.css  _site/investment-advisor/style.css

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
