name: Deploy Activity 5 to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'labs/activity5-multi-agents/index*.html'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site (Activity 5 dashboard at root)
        run: |
          mkdir -p _site
          cp labs/activity5-multi-agents/index*.html _site/
          # default landing = the main dashboard
          cp labs/activity5-multi-agents/index.html _site/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
